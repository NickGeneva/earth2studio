[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "earth2bufrio"
version = "0.1.0"
description = "Pure-Python BUFR decoder — reads WMO BUFR Edition 3/4 files into PyArrow Tables"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "pyarrow>=14.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.15",
    "pytest>=8.0",
    "pytest-cov>=7.0",
    "interrogate>=1.7",
    "pre-commit>=4.0",
]
docs = [
    "sphinx>=9.0,<10",
    "nvidia-sphinx-theme>=0.0.9",
    "myst-parser>=5.0,<6",
    "sphinx-autodoc-typehints>=3.1,<3.7",
    "sphinx-autoapi>=3.8,<4",
    "sphinx-copybutton>=0.5",
    "numpydoc>=1.10",
]
fortran = [
    "numpy>=1.24",
]

[tool.hatch.build.targets.wheel]
packages = ["src/earth2bufrio"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "D", "UP", "N", "B", "A", "C4", "SIM", "TCH", "PTH", "ERA"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "D"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "unit: fast isolated unit tests",
    "crossval: cross-validation tests against reference decoders",
    "integration: tests requiring external resources",
    "fortran: tests requiring the Fortran backend (make fortran)",
    "rust: tests requiring the Rust backend (maturin develop)",
    "slow: long-running tests",
]

[tool.coverage.run]
source = ["earth2bufrio"]

[tool.coverage.report]
show_missing = true
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@overload",
]

[tool.interrogate]
fail-under = 99
ignore-init-method = true
ignore-init-module = true
ignore-module = true
ignore-private = true
ignore-semiprivate = true
ignore-magic = true
exclude = ["tests", "docs"]
color = true
verbose = 2
