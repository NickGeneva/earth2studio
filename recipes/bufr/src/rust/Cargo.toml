[package]
name = "earth2bufr"
version = "0.1.0"
edition = "2021"

[lib]
name = "_lib"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module"] }
arrow = { version = "54", default-features = false, features = ["ffi"] }
pyo3-arrow = "0.7"
rayon = "1.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
